<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Interaktif</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="btn-back">← Kembali ke Landing Page</a>

        <div class="card form-card">
            <h3>Form Interaktif</h3>
            <p class="subtitle">Silakan tinggalkan pesan atau *feedback* Anda di bawah ini.</p>
            
            <form id="pesanForm">
                <div class="input-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Masukkan nama Anda" required>
                </div>
                
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="contoh@email.com" required>
                </div>
                
                <div class="input-group">
                    <label for="pesan">Pesan</label>
                    <textarea id="pesan" placeholder="Tulis pesan Anda di sini..." rows="5" required></textarea>
                </div>
                
                <button type="submit" class="btn-submit">Kirim Pesan <span style="margin-left: 5px;">🚀</span></button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('pesanForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            alert('Terima kasih! Pesan Anda telah berhasil dikirim ke Dimas.');
            this.reset();
        });
    </script>
</body>
</html>
